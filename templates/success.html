<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verified — AdaptiveGuard</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #07090f;
      font-family: 'DM Sans', sans-serif;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #0d1117;
      border: 1px solid rgba(74,222,128,0.2);
      border-radius: 16px;
      padding: 2.5rem;
      text-align: center;
      max-width: 380px;
      width: 90%;
      box-shadow: 0 0 40px rgba(74,222,128,0.08);
      animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.2rem; font-weight: 600; color: #4ade80; margin-bottom: 0.5rem; }
    p  { font-size: 0.85rem; color: #64748b; line-height: 1.6; }
    .back {
      display: inline-block;
      margin-top: 1.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: #38bdf8;
      text-decoration: none;
      border: 1px solid rgba(56,189,248,0.25);
      padding: 6px 16px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .back:hover { background: rgba(56,189,248,0.08); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Identity Verified</h1>
    <p>You passed the human verification challenge successfully. Access granted.</p>
    <a href="/" class="back">← Start over</a>
  </div>
</body>
</html>
